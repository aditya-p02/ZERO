[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"agents/automation.py" = ["E501"]
"agents/research.py" = ["E501"]
"agents/router.py" = ["E501"]
"core/brain.py" = ["E501"]