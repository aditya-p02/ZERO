version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zero_postgres
    environment:
      POSTGRES_DB: zero_memory
      POSTGRES_USER: zero
      POSTGRES_PASSWORD: zero_secure_pass
    ports:
      - "5433:5432"
    volumes:
      - zero_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  zero_postgres_data: